version: "3.8"

services:
  # Existing services...
  postgres:
    image: ankane/pgvector:v0.5.1
    profiles: ["local-db"]
    environment:
      POSTGRES_DB: anything_backend
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # BiRefNet Background Removal Service
  birefnet-service:
    build:
      context: ./birefnet-service
      dockerfile: Dockerfile
    environment:
      - PORT=8000
      - BIREFNET_MODEL=zhengpeng7/BiRefNet
      - BIREFNET_REVISION=${BIREFNET_REVISION:-e2bf8e4460fc8fa32bba5ea4d94b3233d367b0e4}
      - DEVICE=${BIREFNET_DEVICE:-cuda}
      - USE_FP16=${BIREFNET_USE_FP16:-true}
    ports:
      - "8000:8000"
    restart: unless-stopped
    gpus: all
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "-O",
          "-",
          "http://localhost:8000/health",
        ]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 900s
    # Uncomment if you have NVIDIA GPU
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # New: LangGraph Service (MCP client embedded)
  langgraph-service:
    build:
      context: ./langgraph-service
      dockerfile: Dockerfile
    environment:
      - PORT=3002
      - NODE_ENV=development
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - MCP_SERVER_COMMAND=node
      - MCP_SERVER_ARGS=/mcp-server/dist/index.js
      - MCP_SERVER_ENABLED=true
      - RAG_ENABLED=false
      - POSTGRES_HOST=anythingai-postgres.cjqiuosmqhf4.ap-south-1.rds.amazonaws.com
      - POSTGRES_PORT=5432
      - POSTGRES_DB=anything_backend
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=e3irftAd.Y]BNK)ywyG0G!].15p1
      - POSTGRES_SSL=true
      - API_KEY=${API_KEY}
      - BACKEND_GRAPHQL_URL=http://backend:4000/graphql
      - GOOGLE_MAPS_API_KEY=${GOOGLE_MAPS_API_KEY}
    ports:
      - "3002:3002"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./mcp-server:/mcp-server:ro

  # Existing backend service (update if needed)
  backend:
    build:
      context: ./anything-be
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=development
      - PORT=4000
      # Database
      - DB_DIALECT=postgres
      - DB_HOST=anythingai-postgres.cjqiuosmqhf4.ap-south-1.rds.amazonaws.com
      - DB_PORT=5432
      - DB_NAME=anything_backend
      - DB_USER=postgres
      - DB_PASSWORD=e3irftAd.Y]BNK)ywyG0G!].15p1
      - DB_SSL=true
      # Redis
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      # API Keys - loaded from .env file
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - REMOVEBG_API_KEY=${REMOVEBG_API_KEY}
      - PAT=${PAT}
      # ClarifAI Configuration
      - USER_ID=clarifai
      - APP_ID=main
      - MODEL_ID=apparel-detection
      - MODEL_VERSION_ID=1ed35c3d176f45d69d2aa7971e6ab9fe
      - CLASSIFICATION_MODEL_ID=apparel-classification-v2
      - CLASSIFICATION_MODEL_VERSION_ID=1ed35c3d176f45d69d2aa7971e6ab9fe
      # JWT
      - JWT_SECRET=${JWT_SECRET:-your_jwt_secret_change_this_in_production}
      # Google Cloud — place secrets/gcp/anything-ai-main-e9c0ff901947.json on the host (see secrets/gcp/.gitkeep)
      - GCS_BUCKET_NAME=${GCS_BUCKET_NAME:-anything-ai-assets}
      - GOOGLE_APPLICATION_CREDENTIALS=/secrets/gcp/anything-ai-main-e9c0ff901947.json
      - GOOGLE_CLOUD_PROJECT=${GOOGLE_CLOUD_PROJECT}
      - GOOGLE_CLOUD_LOCATION=${GOOGLE_CLOUD_LOCATION:-us-central1}
      - GOOGLE_IMPERSONATE_SERVICE_ACCOUNT=${GOOGLE_IMPERSONATE_SERVICE_ACCOUNT}
      - FCM_PROJECT_ID=${FCM_PROJECT_ID}
      - GOOGLE_MAPS_API_KEY=${GOOGLE_MAPS_API_KEY}
      # LangGraph Integration
      - LANGGRAPH_SERVICE_URL=http://langgraph-service:3002
      - LANGGRAPH_API_KEY=${LANGGRAPH_API_KEY:-langgraph-secret-key-change-in-production}
      # BiRefNet Service
      - USE_BIREFNET=${USE_BIREFNET:-true}
      - BIREFNET_SERVICE_URL=${BIREFNET_SERVICE_URL:-http://birefnet-service:8000}
      - BIREFNET_DEVICE=cuda
      - BIREFNET_USE_FP16=true
      # Debug Options
      - SAVE_DEBUG_IMAGES=${SAVE_DEBUG_IMAGES:-false}
      - VTO_USE_FILEDATA=true
      - VTO_FILEDATA_STRICT=true
      # MSG91 Email Configuration
      - MSG91_EMAIL_AUTH_KEY=${MSG91_EMAIL_AUTH_KEY}
      - MSG91_EMAIL_FROM_EMAIL=${MSG91_EMAIL_FROM_EMAIL}
      - MSG91_EMAIL_FROM_NAME=${MSG91_EMAIL_FROM_NAME}
      - MSG91_EMAIL_DOMAIN=${MSG91_EMAIL_DOMAIN}
      - MSG91_EMAIL_OTP_TEMPLATE_ID=${MSG91_EMAIL_OTP_TEMPLATE_ID}
    ports:
      - "4000:4000"
    volumes:
      - ./secrets/gcp/anything-ai-main-e9c0ff901947.json:/secrets/gcp/anything-ai-main-e9c0ff901947.json:ro
      - ./anything-be/generated-images:/app/generated-images
    depends_on:
      redis:
        condition: service_healthy
      birefnet-service:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:4000/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  # pgAdmin for database management
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: anything-pgadmin
    profiles: ["local-db"]
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "8080:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
volumes:
  postgres_data:
    external: true
    name: anything-be_postgres_data
  pgadmin_data:
